<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Погода — Екатеринбург</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
.sb::-webkit-scrollbar{display:none}.sb{-ms-overflow-style:none;scrollbar-width:none}
.dash{position:relative;height:100vh;width:100%;overflow:hidden;display:flex;flex-direction:column}
.bg{position:absolute;top:0;right:0;bottom:0;left:0;z-index:0;transition:background 3s ease-in-out}
.bg .ov{position:absolute;top:0;right:0;bottom:0;left:0;background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.3),rgba(0,0,0,.65))}
.bg .gr{position:absolute;top:0;right:0;bottom:0;left:0;opacity:.03;background-image:linear-gradient(rgba(0,220,255,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(0,220,255,.5) 1px,transparent 1px);background-size:60px 60px}
.content{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;padding:clamp(10px,2vmin,24px) clamp(12px,2.5vmin,32px) clamp(8px,1.5vmin,16px)}
.top-section{flex:0 0 50%;display:flex;align-items:center;justify-content:center;gap:clamp(12px,3vmin,32px);min-height:0}
.clock-section{display:flex;flex-direction:column;align-items:center;gap:clamp(2px,.5vmin,6px)}
.clock-row{display:flex;align-items:center;gap:clamp(10px,2vmin,20px)}
.city-label{font-size:clamp(9px,1.3vmin,13px);color:rgba(0,220,255,.6);text-transform:uppercase;letter-spacing:.12em;font-weight:500}
.date-label{font-size:clamp(8px,1.1vmin,12px);color:rgba(255,255,255,.3)}
.aclock{width:clamp(120px,18vmin,210px);height:clamp(120px,18vmin,210px);border-radius:50%;border:2px solid rgba(255,255,255,.15);position:relative;background:rgba(0,0,0,.25);flex-shrink:0}
.aclock .tick{position:absolute;top:4px;left:50%;width:1px;height:8px;margin-left:-.5px;background:rgba(255,255,255,.2)}
.aclock .tick.major{height:12px;width:2px;margin-left:-1px;background:rgba(255,255,255,.45)}
.aclock .num{position:absolute;font-weight:300;color:rgba(255,255,255,.4);text-align:center}
.aclock .hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;border-radius:2px}
.aclock .center{position:absolute;top:50%;left:50%;border-radius:50%;background:rgba(0,220,255,.9)}
.digi{font-size:clamp(26px,4.5vmin,52px);font-weight:200;letter-spacing:.05em;font-variant-numeric:tabular-nums;color:rgba(255,255,255,.9);line-height:1}
.digi .colon{animation:cpulse 1s ease-in-out infinite;display:inline-block}
@keyframes cpulse{0%,100%{opacity:.4}50%{opacity:1}}
.weather-summary{display:flex;flex-direction:column;align-items:center;gap:0;text-align:center;justify-content:center}
.ws-temp{font-size:clamp(36px,7vmin,72px);font-weight:100;line-height:1;font-variant-numeric:tabular-nums}
.ws-desc{font-size:clamp(11px,1.8vmin,18px);color:rgba(255,255,255,.6);margin-top:2px}
.ws-icon{font-size:clamp(22px,3.5vmin,38px);line-height:1;margin-bottom:2px}
.ws-feels{font-size:clamp(9px,1.4vmin,13px);color:rgba(255,255,255,.35);margin-top:clamp(2px,.5vmin,6px)}
.ws-details{display:flex;gap:clamp(8px,1.5vmin,18px);margin-top:clamp(4px,.8vmin,8px);flex-wrap:wrap;justify-content:center}
.ws-detail{font-size:clamp(9px,1.3vmin,12px);color:rgba(255,255,255,.4);display:flex;align-items:center;gap:3px}
.ws-detail b{color:rgba(255,255,255,.6);font-weight:500}
.tabs{display:flex;gap:2px;flex-shrink:0;margin-top:clamp(4px,1vmin,10px);border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:0}
.tab-btn{padding:clamp(4px,.8vmin,8px) clamp(8px,1.2vmin,14px);font-size:clamp(9px,1.2vmin,12px);color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:color .2s;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.tab-btn:hover{color:rgba(255,255,255,.6)}
.tab-btn.active{color:rgba(0,220,255,.9);border-bottom-color:rgba(0,220,255,.6)}
.tab-panes{flex:1;overflow:hidden;position:relative;margin-top:clamp(4px,1vmin,10px);min-height:0}
.tab-pane{position:absolute;top:0;right:0;bottom:0;left:0;overflow-y:auto;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.tab-pane.active{opacity:1;visibility:visible}
.hourly-scroll{display:grid;grid-template-columns:repeat(8,1fr);gap:clamp(2px,.4vmin,6px);height:100%;align-content:center;padding:clamp(2px,.3vmin,6px)}
.hcard{width:100%;padding:clamp(4px,.6vmin,8px) clamp(2px,.3vmin,4px);border-radius:8px;background:rgba(255,255,255,.04);text-align:center;display:flex;flex-direction:column;align-items:center;gap:clamp(2px,.3vmin,3px);transition:background .2s;justify-content:center}
.hcard:hover{background:rgba(255,255,255,.08)}
.hcard.now{background:rgba(0,220,255,.1);border:1px solid rgba(0,220,255,.2)}
.hcard-time{font-size:clamp(7px,1vmin,9px);color:rgba(255,255,255,.35)}
.hcard-icon{font-size:clamp(14px,2.2vmin,18px);line-height:1}
.hcard-temp{font-size:clamp(10px,1.4vmin,13px);font-weight:500;font-variant-numeric:tabular-nums}
.hcard-precip{font-size:clamp(6px,.9vmin,8px);color:rgba(0,180,255,.6)}
.wrow{display:flex;align-items:center;padding:clamp(3px,.5vmin,5px) clamp(4px,.6vmin,7px);border-radius:6px;transition:background .2s}
.wrow:hover{background:rgba(255,255,255,.03)}
.wrow.today{background:rgba(0,220,255,.06)}
.wday{width:clamp(38px,5vmin,52px);font-size:clamp(9px,1.3vmin,11px);color:rgba(255,255,255,.5);flex-shrink:0}
.wrow.today .wday{color:rgba(0,220,255,.8);font-weight:600}
.wdate{width:clamp(18px,2.5vmin,24px);font-size:clamp(7px,1.1vmin,9px);color:rgba(255,255,255,.2);text-align:center;flex-shrink:0}
.wicon{width:clamp(20px,2.8vmin,26px);text-align:center;font-size:clamp(12px,1.8vmin,16px);flex-shrink:0}
.wprecip{width:clamp(28px,3.5vmin,38px);text-align:right;font-size:clamp(7px,1.1vmin,9px);color:rgba(0,180,255,.5);flex-shrink:0}
.wmin{width:clamp(20px,2.5vmin,26px);text-align:right;font-size:clamp(9px,1.3vmin,11px);color:rgba(255,255,255,.35);font-variant-numeric:tabular-nums;flex-shrink:0}
.wbar{flex:1;height:clamp(4px,.7vmin,6px);background:rgba(255,255,255,.05);border-radius:99px;position:relative;min-width:clamp(20px,3vmin,30px);margin:0 clamp(3px,.5vmin,6px)}
.wbar-fill{position:absolute;height:100%;border-radius:99px;transition:left .5s,width .5s}
.wmax{width:clamp(20px,2.5vmin,26px);font-size:clamp(9px,1.3vmin,11px);color:rgba(255,255,255,.65);font-variant-numeric:tabular-nums;flex-shrink:0}
.aqi-big{display:flex;align-items:center;gap:clamp(10px,1.5vmin,16px);margin-bottom:clamp(8px,1.2vmin,12px)}
.aqi-num{font-size:clamp(28px,5vmin,48px);font-weight:100;font-variant-numeric:tabular-nums;line-height:1}
.aqi-lbl{font-size:clamp(8px,1.2vmin,12px);color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.05em}
.aqi-lvl{font-size:clamp(10px,1.5vmin,15px);font-weight:500;margin-top:2px}
.aqi-dsc{font-size:clamp(8px,1.1vmin,11px);color:rgba(255,255,255,.25);margin-top:4px;line-height:1.5}
.poll-grid{display:flex;flex-wrap:wrap;gap:clamp(6px,1vmin,12px)}
.poll-item{background:rgba(255,255,255,.04);border-radius:6px;padding:clamp(6px,.8vmin,9px) clamp(8px,1vmin,12px);min-width:clamp(70px,10vmin,100px)}
.poll-name{font-size:clamp(6px,.9vmin,9px);color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.poll-val{font-size:clamp(10px,1.5vmin,16px);color:rgba(255,255,255,.7);font-weight:500;font-variant-numeric:tabular-nums}
.poll-unit{font-size:clamp(6px,.8vmin,9px);color:rgba(255,255,255,.2);margin-left:2px}
.sun-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:clamp(4px,.8vmin,8px)}
.sun-item{text-align:center}
.sun-item-label{font-size:clamp(7px,1.1vmin,10px);color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em}
.sun-item-time{font-size:clamp(12px,2vmin,18px);font-weight:500;font-variant-numeric:tabular-nums;margin-top:2px}
.sun-mid{text-align:center}
.sun-mid-label{font-size:clamp(7px,1vmin,9px);color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.05em}
.sun-mid-val{font-size:clamp(9px,1.4vmin,13px);color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums}
.sun-arc{margin:clamp(4px,.6vmin,8px) 0}
.sun-arc svg{width:100%;height:clamp(40px,6vmin,60px);display:block}
.sun-remain{text-align:center;margin-bottom:clamp(6px,1vmin,10px)}
.sun-remain-lbl{font-size:clamp(7px,1vmin,9px);color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.05em}
.sun-remain-val{font-size:clamp(9px,1.3vmin,12px);color:rgba(251,191,36,.6);font-variant-numeric:tabular-nums}
.sun-wk-label{font-size:clamp(7px,1.1vmin,9px);color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sun-wk-row{display:flex;justify-content:space-between;font-size:clamp(8px,1.2vmin,11px);padding:clamp(1px,.2vmin,2px) 0}
.sun-wk-day{color:rgba(255,255,255,.3);width:clamp(38px,5vmin,52px)}
.sun-wk-day.today{color:rgba(0,220,255,.6)}
.sun-wk-rise{color:rgba(251,191,36,.5);font-variant-numeric:tabular-nums}
.sun-wk-dash{color:rgba(255,255,255,.1)}
.sun-wk-set{color:rgba(251,146,60,.5);font-variant-numeric:tabular-nums}
.update-info{position:fixed;bottom:6px;right:10px;font-size:8px;color:rgba(255,255,255,.15);z-index:10}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:rgba(0,220,255,.6);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.2);border-radius:8px;padding:16px;text-align:center;color:rgba(255,120,120,.8);font-size:12px;margin-top:20px;line-height:1.6}
</style>
</head>
<body>
<div class="dash">
  <div class="bg" id="bg"><div class="ov"></div><div class="gr"></div></div>
  <div class="content">
    <div class="top-section">
      <div class="clock-section">
        <div class="city-label">Екатеринбург</div>
        <div class="clock-row">
          <div class="aclock" id="aclock"></div>
          <div><div class="digi" id="digi">--:--:--</div><div class="date-label" id="datelabel">--</div></div>
        </div>
      </div>
      <div class="weather-summary" id="wsummary">
        <div class="ws-icon" id="ws-icon"><span class="loading-spinner"></span></div>
        <div class="ws-temp" id="ws-temp">--°</div>
        <div class="ws-desc" id="ws-desc">Загрузка данных...</div>
        <div class="ws-feels" id="ws-feels"></div>
        <div class="ws-details" id="ws-details"></div>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="current">Текущая</button>
      <button class="tab-btn" data-tab="hourly">Почасовая</button>
      <button class="tab-btn" data-tab="weekly">Неделя</button>
      <button class="tab-btn" data-tab="aqi">Качество</button>
      <button class="tab-btn" data-tab="sun">Солнце</button>
    </div>
    <div class="tab-panes" id="panes">
      <div class="tab-pane active" id="p-current"></div>
      <div class="tab-pane" id="p-hourly"></div>
      <div class="tab-pane" id="p-weekly"></div>
      <div class="tab-pane" id="p-aqi"></div>
      <div class="tab-pane" id="p-sun"></div>
    </div>
  </div>
</div>
<div class="update-info" id="updinfo"></div>

<script>
// ══════════════════════════════════════
//  КОНФИГУРАЦИЯ
// ══════════════════════════════════════
var LAT = 56.8389;
var LON = 60.6057;
var TZ = 'Asia/Yekaterinburg';

var W_URL = 'https://api.open-meteo.com/v1/forecast?latitude=' + LAT + '&longitude=' + LON +
  '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl,precipitation,cloud_cover' +
  '&hourly=temperature_2m,weather_code,precipitation_probability,wind_speed_10m,precipitation' +
  '&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,wind_speed_10m_max,precipitation_probability_max' +
  '&timezone=' + TZ + '&forecast_days=7';

var A_URL = 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + LAT + '&longitude=' + LON +
  '&current=pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,sulphur_dioxide,ozone,us_aqi' +
  '&hourly=pm2_5,us_aqi&timezone=' + TZ + '&forecast_days=1';

var WD = null;
var AD = null;

// ══════════════════════════════════════
//  ЗАГРУЗКА ДАННЫХ
// ══════════════════════════════════════
function httpGet(url, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 20000;
  xhr.onreadystatechange = function () {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          callback(null, JSON.parse(xhr.responseText));
        } catch (e) {
          callback(e, null);
        }
      } else {
        callback(new Error('HTTP ' + xhr.status), null);
      }
    }
  };
  xhr.onerror = function () { callback(new Error('Сеть недоступна'), null); };
  xhr.ontimeout = function () { callback(new Error('Таймаут'), null); };
  xhr.send();
}

function loadWeather() {
  document.getElementById('ws-icon').innerHTML = '<span class="loading-spinner"></span>';
  document.getElementById('ws-desc').textContent = 'Загрузка данных...';

  httpGet(W_URL, function (err, data) {
    if (err || !data || !data.current) {
      document.getElementById('ws-icon').textContent = '⚠️';
      document.getElementById('ws-desc').textContent = 'Ошибка загрузки погоды';
      document.getElementById('p-current').innerHTML = '<div class="error-msg">Не удалось загрузить данные о погоде. Проверьте подключение к интернету и обновите страницу (F5).</div>';
      return;
    }
    WD = data;

    httpGet(A_URL, function (err2, data2) {
      if (!err2 && data2 && data2.current) {
        AD = data2;
      }
      renderWeather();
    });
  });
}

// ══════════════════════════════════════
//  УТИЛИТЫ
// ══════════════════════════════════════
var DAYS_RU = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
var DAYS_SHORT = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
var MONTHS_RU = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function wmoInfo(c) {
  var m = {
    0: { d: 'Ясно', i: '☀️' }, 1: { d: 'Преим. ясно', i: '🌤️' }, 2: { d: 'Переменная обл.', i: '⛅' },
    3: { d: 'Пасмурно', i: '☁️' }, 45: { d: 'Туман', i: '🌫️' }, 48: { d: 'Изморозь', i: '🌫️' },
    51: { d: 'Лёгкая морось', i: '🌦️' }, 53: { d: 'Морось', i: '🌦️' }, 55: { d: 'Сильная морось', i: '🌧️' },
    56: { d: 'Ледяная морось', i: '🌧️' }, 57: { d: 'Сильн. лед. морось', i: '🌧️' },
    61: { d: 'Небольшой дождь', i: '🌧️' }, 63: { d: 'Дождь', i: '🌧️' }, 65: { d: 'Сильный дождь', i: '🌧️' },
    66: { d: 'Ледяной дождь', i: '🌧️' }, 67: { d: 'Сильн. лед. дождь', i: '🌧️' },
    71: { d: 'Небольшой снег', i: '🌧️' }, 73: { d: 'Снег', i: '❄️' }, 75: { d: 'Сильный снег', i: '❄️' },
    77: { d: 'Снежные зёрна', i: '❄️' }, 80: { d: 'Ливень', i: '🌦️' },
    81: { d: 'Сильный ливень', i: '🌧️' }, 82: { d: 'Очень сильный ливень', i: '🌧️' },
    85: { d: 'Снегопад', i: '🌧️' }, 86: { d: 'Сильный снегопад', i: '❄️' },
    95: { d: 'Гроза', i: '⛈️' }, 96: { d: 'Гроза с градом', i: '⛈️' }, 99: { d: 'Сильная гроза', i: '⛈️' }
  };
  return m[c] || { d: 'Неизвестно', i: '❓' };
}

function windDir(d) {
  var r = ['С', 'ССВ', 'СВ', 'ВСВ', 'В', 'ВЮВ', 'ЮВ', 'ЮЮВ', 'Ю', 'ЮЮЗ', 'ЮЗ', 'ЗЮЗ', 'З', 'ЗСЗ', 'СЗ', 'ССЗ'];
  return r[Math.round(d / 22.5) % 16];
}

function fmtTime(iso) {
  if (!iso) return '--:--';
  var p = iso.split('T')[1].split('+')[0];
  var h = parseInt(p.split(':')[0], 10);
  return pad(h) + ':' + p.split(':')[1];
}

function aqiColor(v) {
  if (v <= 50) return '#22c55e'; if (v <= 100) return '#eab308'; if (v <= 150) return '#f97316';
  if (v <= 200) return '#ef4444'; if (v <= 300) return '#a855f7'; return '#7f1d1d';
}
function aqiLevel(v) {
  if (v <= 50) return 'Хорошее'; if (v <= 100) return 'Умеренное'; if (v <= 150) return 'Нездоровое (чувств.)';
  if (v <= 200) return 'Нездоровое'; if (v <= 300) return 'Очень нездоровое'; return 'Опасное';
}
function aqiDesc(v) {
  if (v <= 50) return 'Качество воздуха отличное. Можно гулять и заниматься спортом.';
  if (v <= 100) return 'Приемлемое качество. Чувствительные люди могут заметить дискомфорт.';
  if (v <= 150) return 'Нездоров для чувствительных групп. Ограничьте время на улице.';
  if (v <= 200) return 'Все могут испытывать последствия. Ограничьте нахождение на улице.';
  if (v <= 300) return 'Предупреждение о здоровье. Избегайте нахождения на улице.';
  return 'Опасно для здоровья! Оставайтесь в помещении.';
}

// ══════════════════════════════════════
//  ФОНЫ
// ══════════════════════════════════════
var bgs = [
  'linear-gradient(135deg,#0c0e1a 0%,#1a1040 30%,#3d1f5c 50%,#8b3a62 80%,#d4556b 100%)',
  'linear-gradient(to bottom,#0a1628 0%,#1b3a4b 35%,#2d6a4f 65%,#40916c 100%)',
  'linear-gradient(135deg,#141e30 0%,#243b55 35%,#533483 65%,#e94560 100%)',
  'linear-gradient(to bottom,#0d1b2a 0%,#1b263b 30%,#415a77 60%,#778da9 100%)',
  'linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)',
  'linear-gradient(to bottom,#1a1a2e 0%,#16213e 40%,#0f3460 70%,#533483 100%)'
];
var bgIdx = 0;
var bgEl = document.getElementById('bg');
bgEl.style.background = bgs[0];
setInterval(function () { bgIdx = (bgIdx + 1) % bgs.length; bgEl.style.background = bgs[bgIdx]; }, 45000);

// ══════════════════════════════════════
//  АНАЛОГОВЫЕ ЧАСЫ
// ══════════════════════════════════════
(function () {
  var el = document.getElementById('aclock');
  var sz = el.offsetWidth || 180;
  var cx = sz / 2;
  var tickR = cx - 4;
  var numR = cx - 19;
  var numSz = Math.max(14, Math.round(sz * 0.085));

  for (var i = 0; i < 60; i++) {
    var t = document.createElement('div');
    var isMajor = i % 5 === 0;
    t.className = 'tick' + (isMajor ? ' major' : '');
    var origin = isMajor ? '1px ' + tickR + 'px' : '0.5px ' + tickR + 'px';
    t.style.cssText = 'position:absolute;top:4px;left:50%;transform:rotate(' + (i * 6) + 'deg);transform-origin:' + origin;
    if (isMajor) { t.style.width = '2px'; t.style.height = '12px'; t.style.marginLeft = '-1px'; t.style.background = 'rgba(255,255,255,.45)'; }
    else { t.style.width = '1px'; t.style.height = '8px'; t.style.marginLeft = '-0.5px'; t.style.background = 'rgba(255,255,255,.2)'; }
    el.appendChild(t);
  }
  for (var h = 1; h <= 12; h++) {
    var n = document.createElement('div'); n.className = 'num';
    var a = h * 30 - 90;
    n.style.fontSize = numSz + 'px';
    n.style.width = numSz + 'px'; n.style.height = numSz + 'px'; n.style.lineHeight = numSz + 'px';
    n.style.left = (cx + numR * Math.cos(a * Math.PI / 180) - numSz / 2) + 'px';
    n.style.top = (cx + numR * Math.sin(a * Math.PI / 180) - numSz / 2) + 'px';
    n.textContent = h; el.appendChild(n);
  }
  var hands = [
    { cls: 'h-hand', w: 3, h: sz * 0.23, ml: -1.5, bg: 'rgba(255,255,255,.85)' },
    { cls: 'm-hand', w: 2, h: sz * 0.31, ml: -1, bg: 'rgba(255,255,255,.7)' },
    { cls: 's-hand', w: 1, h: sz * 0.35, ml: -0.5, bg: 'rgba(0,220,255,.8)' }
  ];
  hands.forEach(function (hd) {
    var d = document.createElement('div');
    d.className = 'hand ' + hd.cls;
    d.style.width = hd.w + 'px'; d.style.height = hd.h + 'px'; d.style.marginLeft = hd.ml + 'px'; d.style.background = hd.bg;
    el.appendChild(d);
  });
  var cdSz = Math.max(4, Math.round(sz * 0.046));
  var cd = document.createElement('div'); cd.className = 'center';
  cd.style.width = cdSz + 'px'; cd.style.height = cdSz + 'px'; cd.style.margin = (-cdSz / 2) + 'px';
  el.appendChild(cd);
})();

// ══════════════════════════════════════
//  ЧАСЫ
// ══════════════════════════════════════
function updateClock() {
  var now = new Date(), h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  document.getElementById('digi').innerHTML = pad(h) + '<span class="colon">:</span>' + pad(m) + '<span class="colon">:</span>' + pad(s);
  document.getElementById('datelabel').textContent = DAYS_RU[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS_RU[now.getMonth()] + ' ' + now.getFullYear();
  var hDeg = (h % 12 + m / 60) * 30, mDeg = (m + s / 60) * 6, sDeg = s * 6;
  var hh = document.querySelector('.h-hand'), mh = document.querySelector('.m-hand'), sh = document.querySelector('.s-hand');
  if (hh) hh.style.transform = 'rotate(' + hDeg + 'deg)';
  if (mh) mh.style.transform = 'rotate(' + mDeg + 'deg)';
  if (sh) sh.style.transform = 'rotate(' + sDeg + 'deg)';
}
updateClock();
setInterval(updateClock, 1000);

// ══════════════════════════════════════
//  ВКЛАДКИ
// ══════════════════════════════════════
var TMAP = { current: 'p-current', hourly: 'p-hourly', weekly: 'p-weekly', aqi: 'p-aqi', sun: 'p-sun' };
document.getElementById('tabs').addEventListener('click', function (e) {
  var btn = e.target.closest('.tab-btn'); if (!btn) return;
  var id = btn.getAttribute('data-tab');
  var btns = document.querySelectorAll('.tab-btn'); for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  var panes = document.querySelectorAll('.tab-pane'); for (var i = 0; i < panes.length; i++) panes[i].classList.remove('active');
  var t = document.getElementById(TMAP[id]); if (t) t.classList.add('active');
});

// ══════════════════════════════════════
//  ОТОБРАЖЕНИЕ ПОГОДЫ
// ══════════════════════════════════════
function renderWeather() {
  if (!WD || !WD.current) { document.getElementById('ws-desc').textContent = 'Нет данных'; return; }
  var c = WD.current, wi = wmoInfo(c.weather_code);
  document.getElementById('ws-icon').textContent = wi.i;
  document.getElementById('ws-temp').textContent = Math.round(c.temperature_2m) + '°C';
  document.getElementById('ws-desc').textContent = wi.d;
  document.getElementById('ws-feels').textContent = 'Ощущается ' + Math.round(c.apparent_temperature) + '°C';
  document.getElementById('ws-details').innerHTML =
    '<div class="ws-detail">💧 <b>' + c.relative_humidity_2m + '</b>%</div>' +
    '<div class="ws-detail">💨 <b>' + c.wind_speed_10m + '</b> м/с ' + windDir(c.wind_direction_10m) + '</div>' +
    '<div class="ws-detail">📊 <b>' + Math.round(c.pressure_msl) + '</b> гПа</div>' +
    '<div class="ws-detail">☁ <b>' + c.cloud_cover + '</b>%</div>';
  if (WD.current_time) document.getElementById('updinfo').textContent = 'Обновлено: ' + fmtTime(WD.current_time);
  renderCurrentTab(c, wi); renderHourlyTab(); renderWeeklyTab(); renderAQITab(); renderSunTab();
}

function card(icon, label, value) {
  return '<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:clamp(8px,1.4vmin,16px) clamp(8px,1.2vmin,14px);display:flex;flex-direction:column;justify-content:center;overflow:hidden"><div style="font-size:clamp(8px,1.2vmin,10px);color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.05em;margin-bottom:clamp(3px,.5vmin,6px)">' + icon + ' ' + label + '</div><div style="font-size:clamp(14px,2.2vmin,20px);color:rgba(255,255,255,.8);font-weight:500;white-space:nowrap">' + value + '</div></div>';
}

function renderCurrentTab(c, wi) {
  document.getElementById('p-current').innerHTML =
    '<div style="padding:clamp(4px,.6vmin,8px);height:100%;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:clamp(6px,1vmin,12px)">' +
    card('🌡', 'Температура', Math.round(c.temperature_2m) + '°C') +
    card('🌡', 'Ощущается', Math.round(c.apparent_temperature) + '°C') +
    card('💧', 'Влажность', c.relative_humidity_2m + '%') +
    card('💨', 'Ветер', c.wind_speed_10m + ' м/с ' + windDir(c.wind_direction_10m)) +
    card('📊', 'Давление', Math.round(c.pressure_msl) + ' гПа') +
    card('☁', 'Облачность', c.cloud_cover + '%') +
    card('🌧', 'Осадки', c.precipitation + ' мм') +
    card('🌤', 'Состояние', wi.d) +
    '</div>';
}

function renderHourlyTab() {
  var el = document.getElementById('p-hourly');
  if (!WD || !WD.hourly) return;
  var hr = WD.hourly, nowH = new Date().getHours(), html = '<div class="hourly-scroll">', si = 0;
  for (var i = 0; i < hr.time.length; i++) { var th = parseInt(hr.time[i].split('T')[1].split(':')[0], 10); if (th >= nowH) { si = i; break; } }
  if (nowH > parseInt(hr.time[hr.time.length - 1].split('T')[1].split(':')[0], 10)) si = hr.time.length - 24;
  var cnt = Math.min(24, hr.time.length - si);
  for (var i = 0; i < cnt; i++) {
    var idx = si + i; if (idx >= hr.time.length) break;
    var h = parseInt(hr.time[idx].split('T')[1].split(':')[0], 10), isN = i === 0, wi = wmoInfo(hr.weather_code[idx]);
    var pp = hr.precipitation_probability[idx], ps = pp > 0 ? pp + '%' : '';
    html += '<div class="hcard' + (isN ? ' now' : '') + '"><div class="hcard-time">' + (isN ? 'Сейчас' : pad(h) + ':00') + '</div><div class="hcard-icon">' + wi.i + '</div><div class="hcard-temp">' + Math.round(hr.temperature_2m[idx]) + '°</div>' + (ps ? '<div class="hcard-precip">💧 ' + ps + '</div>' : '') + '</div>';
  }
  el.innerHTML = html + '</div>';
}

function renderWeeklyTab() {
  var el = document.getElementById('p-weekly');
  if (!WD || !WD.daily) return;
  var d = WD.daily, todayS = new Date().toISOString().split('T')[0], mn = 999, mx = -999, html = '';
  for (var i = 0; i < d.time.length; i++) { if (d.temperature_2m_min[i] < mn) mn = d.temperature_2m_min[i]; if (d.temperature_2m_max[i] > mx) mx = d.temperature_2m_max[i]; }
  var rng = mx - mn || 1;
  for (var i = 0; i < d.time.length; i++) {
    var dt = new Date(d.time[i] + 'T12:00:00'), isT = d.time[i] === todayS, wi = wmoInfo(d.weather_code[i]);
    var pp = d.precipitation_probability_max[i], ps = pp > 0 ? pp + '%' : '';
    var minT = d.temperature_2m_min[i], maxT = d.temperature_2m_max[i];
    var left = ((minT - mn) / rng) * 100, width = Math.max(5, ((maxT - minT) / rng) * 100);
    var bc = minT < 0 ? 'rgba(56,189,248,.5)' : minT < 15 ? 'rgba(34,197,94,.5)' : 'rgba(251,191,36,.5)';
    html += '<div class="wrow' + (isT ? ' today' : '') + '"><div class="wday">' + DAYS_SHORT[dt.getDay()] + '</div><div class="wdate">' + dt.getDate() + '</div><div class="wicon">' + wi.i + '</div><div class="wprecip">' + (ps ? '💧 ' + ps : '') + '</div><div class="wmin">' + Math.round(minT) + '°</div><div class="wbar"><div class="wbar-fill" style="left:' + left + '%;width:' + width + '%;background:' + bc + '"></div></div><div class="wmax">' + Math.round(maxT) + '°</div></div>';
  }
  el.innerHTML = '<div style="padding:clamp(2px,.4vmin,6px) 0;height:100%;display:flex;flex-direction:column;justify-content:center">' + html + '</div>';
}

function renderAQITab() {
  var el = document.getElementById('p-aqi');
  if (!AD || !AD.current) { el.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,.3);font-size:12px">Данные о качестве воздуха недоступны</div>'; return; }
  var c = AD.current, aqi = c.us_aqi || 0, clr = aqiColor(aqi);
  function pi(n, v, u) { return '<div class="poll-item"><div class="poll-name">' + n + '</div><div class="poll-val">' + (v != null ? (typeof v === 'number' ? Math.round(v * 10) / 10 : v) : '--') + '<span class="poll-unit">' + u + '</span></div></div>'; }
  el.innerHTML = '<div style="padding:4px"><div class="aqi-big"><div><div class="aqi-num" style="color:' + clr + '">' + aqi + '</div><div class="aqi-lbl">Индекс AQI (США)</div><div class="aqi-lvl" style="color:' + clr + '">' + aqiLevel(aqi) + '</div><div class="aqi-dsc">' + aqiDesc(aqi) + '</div></div></div><div class="poll-grid">' + pi('PM2.5', c.pm2_5, 'µg/m³') + pi('PM10', c.pm10, 'µg/m³') + pi('O₃', c.ozone, 'µg/m³') + pi('NO₂', c.nitrogen_dioxide, 'µg/m³') + pi('SO₂', c.sulphur_dioxide, 'µg/m³') + pi('CO', c.carbon_monoxide ? Math.round(c.carbon_monoxide) : '--', 'µg/m³') + '</div></div>';
}

function renderSunTab() {
  var el = document.getElementById('p-sun');
  if (!WD || !WD.daily) return;
  var d = WD.daily, todayS = new Date().toISOString().split('T')[0], ti = 0;
  for (var i = 0; i < d.time.length; i++) { if (d.time[i] === todayS) { ti = i; break; } }
  var rT = d.sunrise[ti], sT = d.sunset[ti], riseT = fmtTime(rT), setT = fmtTime(sT), dayLen = '--';
  if (rT && sT) { var df = new Date(sT) - new Date(rT), dh = Math.floor(df / 3600000), dm = Math.floor((df % 3600000) / 60000); dayLen = dh + 'ч ' + dm + 'мин'; }
  var now = new Date(), rMs = new Date(rT).getTime(), sMs = new Date(sT).getTime(), nMs = now.getTime(), prog = 0;
  if (nMs >= rMs && nMs <= sMs && sMs > rMs) prog = (nMs - rMs) / (sMs - rMs); else if (nMs > sMs) prog = 1;
  var aW = 280, aH = 50, cx = aW / 2, cy = aH - 4, r = 50, ang = Math.PI - prog * Math.PI;
  var sx = cx + r * Math.cos(ang), sy = cy - r * Math.sin(ang), isD = prog > 0 && prog < 1;
  var sClr = isD ? '#fbbf24' : 'rgba(255,255,255,.3)';
  var svg = '<svg viewBox="0 0 ' + aW + ' ' + aH + '" preserveAspectRatio="xMidYMid meet"><path d="M ' + (cx - r) + ' ' + cy + ' A ' + r + ' ' + r + ' 0 0 1 ' + (cx + r) + ' ' + cy + '" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2" stroke-dasharray="4,4"/>' + (isD ? '<path d="M ' + (cx - r) + ' ' + cy + ' A ' + r + ' ' + r + ' 0 0 1 ' + sx.toFixed(1) + ' ' + sy.toFixed(1) + '" fill="none" stroke="rgba(251,191,36,.4)" stroke-width="2"/>' : '') + '<circle cx="' + sx.toFixed(1) + '" cy="' + sy.toFixed(1) + '" r="5" fill="' + sClr + '" ' + (isD ? 'style="filter:drop-shadow(0 0 6px rgba(251,191,36,.6))"' : '') + '/><line x1="' + cx + '" y1="' + cy + '" x2="' + cx + '" y2="' + (cy - 4) + '" stroke="rgba(255,255,255,.1)" stroke-width="1"/><text x="' + (cx - r) + '" y="' + (cy + 12) + '" text-anchor="middle" fill="rgba(255,255,255,.2)" font-size="8" font-family="sans-serif">' + riseT + '</text><text x="' + (cx + r) + '" y="' + (cy + 12) + '" text-anchor="middle" fill="rgba(255,255,255,.2)" font-size="8" font-family="sans-serif">' + setT + '</text></svg>';
  var remStr = '';
  if (isD) { var rm = sMs - nMs, rh = Math.floor(rm / 3600000), rmi = Math.floor((rm % 3600000) / 60000); remStr = 'До заката: ' + rh + 'ч ' + rmi + 'мин'; }
  else if (nMs < rMs) { var rm2 = rMs - nMs, rh2 = Math.floor(rm2 / 3600000), rm3 = Math.floor((rm2 % 3600000) / 60000); remStr = 'До восхода: ' + rh2 + 'ч ' + rm3 + 'мин'; }
  else { remStr = 'Солнце зашло'; }
  var wkH = '';
  for (var i = 0; i < d.time.length; i++) { var dt = new Date(d.time[i] + 'T12:00:00'); wkH += '<div class="sun-wk-row"><span class="sun-wk-day' + (i === ti ? ' today' : '') + '">' + DAYS_SHORT[dt.getDay()] + '</span><span class="sun-wk-rise">' + fmtTime(d.sunrise[i]) + '</span><span class="sun-wk-dash">—</span><span class="sun-wk-set">' + fmtTime(d.sunset[i]) + '</span></div>'; }
  el.innerHTML = '<div style="padding:4px"><div class="sun-top"><div class="sun-item"><div class="sun-item-label">🌅 Восход</div><div class="sun-item-time" style="color:rgba(251,191,36,.7)">' + riseT + '</div></div><div class="sun-mid"><div class="sun-mid-label">Световой день</div><div class="sun-mid-val">' + dayLen + '</div></div><div class="sun-item"><div class="sun-item-label">🌇 Закат</div><div class="sun-item-time" style="color:rgba(251,146,60,.7)">' + setT + '</div></div></div><div class="sun-arc">' + svg + '</div><div class="sun-remain"><div class="sun-remain-val">' + remStr + '</div></div><div class="sun-wk-label">Восход / Закат на неделю</div>' + wkH + '</div>';
}

// ══════════════════════════════════════
//  ЗАПУСК
// ══════════════════════════════════════
loadWeather();
// Автообновление каждые 15 минут
setInterval(loadWeather, 900000);
</script>
